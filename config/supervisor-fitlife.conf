; Supervisor configuration for FitLife Milano queue worker.
; Copy to /etc/supervisor/conf.d/ (or equivalent) on the production server.
; Then: supervisorctl reread && supervisorctl update && supervisorctl start fitlife-queue

[program:fitlife-queue]
process_name=%(program_name)s_%(process_num)02d
command=php /var/www/html/artisan queue:work --queue=broadcasts,default --sleep=3 --tries=3
directory=/var/www/html
autostart=true
autorestart=true
numprocs=1
user=www-data
redirect_stderr=true
stdout_logfile=/var/www/html/storage/logs/queue.log
